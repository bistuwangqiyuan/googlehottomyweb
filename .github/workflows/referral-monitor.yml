name: referral-monitor

# 铭信导流监控：每天两次对线上站点做供给侧测量（ai-infra 简报数、赞助触点、
# 合规三要素、铭信落地页可达性），快照追加到 data/referral_monitor.jsonl 入库，
# 形成任何人可查证的时间序列。点击/转化归因在铭信站点侧（UTM），此处不采集。
on:
  schedule:
    - cron: "43 3,15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: referral-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --quiet requests

      - name: Run referral monitor against live site
        id: monitor
        # 合规缺失时脚本退出码为 1 → 工作流标红可见告警，但快照仍已写出
        continue-on-error: true
        run: python scripts/14_referral_monitor.py --base-url https://trendflow-site.vercel.app

      - name: Commit snapshot
        run: |
          # 与内容流水线一致：用仓库所有者身份提交（Vercel 免费版会 BLOCK 非团队成员提交者触发的部署）
          git config user.name "wang qiyuan"
          git config user.email "82208691+bistuwangqiyuan@users.noreply.github.com"
          git add data/referral_monitor.jsonl data/referral_monitor_latest.json
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "data: referral monitor snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            n=0
            until git pull --rebase -X theirs origin ${GITHUB_REF_NAME} \
                  && git push origin HEAD:${GITHUB_REF_NAME}; do
              n=$((n+1))
              if [ "$n" -ge 3 ]; then echo "::error::push failed after 3 attempts"; exit 1; fi
              git rebase --abort 2>/dev/null || true
              sleep 15
            done
          fi

      - name: Surface compliance problems
        if: steps.monitor.outcome == 'failure'
        run: echo "::warning::referral monitor found compliance problems; see data/referral_monitor_latest.json"
