name: content-pipeline

on:
  schedule:
    # 每小时运行一次（UTC，24/7 最高密度）——热词生命周期短（榜单数小时轮换），
    # 逐小时采样把 ai-infra 机会窗口的漏检降到最低；大众类内容量由 --max-publish
    # 配额约束（ai-infra 不占配额），不随频率线性膨胀。部署预算核对：每轮至多
    # 1 次内容推送 → ≤24 部署/天 + 监控 4 次/天，远低于 Vercel Hobby 100 次/天上限
    - cron: "17 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: content-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # LLM 模式高产轮次（如 13 篇 ai-infra）成稿+审核可达 15 分钟，加看门狗最长 8 分钟，
    # 20 分钟上限实测会把正常运行掐死在推送/看门狗阶段（2026-07-20 定时轮被取消）
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline dependencies
        run: python -m pip install --quiet requests

      - name: Run content pipeline
        env:
          # 未配置 secrets 时自动以简报模式运行（无编造风险的确定性模板）。
          # 生成与主审用不同厂商（独立双模型关口）；FALLBACK 为宕机降级链，
          # 全链失败时生成回退确定性模板、审核 fail-closed。
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_FALLBACK_API_KEY: ${{ secrets.LLM_FALLBACK_API_KEY }}
          LLM_FALLBACK_BASE_URL: ${{ secrets.LLM_FALLBACK_BASE_URL }}
          LLM_FALLBACK_MODEL: ${{ secrets.LLM_FALLBACK_MODEL }}
          REVIEW_API_KEY: ${{ secrets.REVIEW_API_KEY }}
          REVIEW_BASE_URL: ${{ secrets.REVIEW_BASE_URL }}
          REVIEW_MODEL: ${{ secrets.REVIEW_MODEL }}
          REVIEW_FALLBACK_API_KEY: ${{ secrets.REVIEW_FALLBACK_API_KEY }}
          REVIEW_FALLBACK_BASE_URL: ${{ secrets.REVIEW_FALLBACK_BASE_URL }}
          REVIEW_FALLBACK_MODEL: ${{ secrets.REVIEW_FALLBACK_MODEL }}
        # --max-publish 仅约束非 ai-infra 类（大众/消费科技）；ai-infra 全量放行。
        # 加频原则"加频必收紧大众配额"：2h→1h 同时配额 3→2，大众类总量受
        # "每轮 2 篇 + 7 天去重窗"双重约束，规避规模化内容滥用风险
        run: python -m pipeline.run_pipeline --max-publish 2

      - name: Commit and push new content
        id: commit
        run: |
          # 必须用仓库所有者的 GitHub 身份提交：Vercel 免费版会 BLOCK 非团队成员
          # 提交者触发的部署（2026-07-19 实测：bot 身份提交全部 BLOCKED，本人身份全部 READY）
          git config user.name "wang qiyuan"
          git config user.email "82208691+bistuwangqiyuan@users.noreply.github.com"
          git add site/content
          if git diff --cached --quiet; then
            echo "No new content this run."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            slug=$(git diff --cached --name-only --diff-filter=A -- site/content/briefings \
                   | head -n1 | xargs -r basename | sed 's/\.json$//')
            git commit -m "content: automated pipeline run $(date -u +%Y-%m-%dT%H:%MZ)"
            # 并发轮次可能发布相同热词文件（add/add 冲突）。rebase 时 -X theirs
            # 取本次成稿版本（两版语义等价，均已过审），失败则 abort 重试，最多 3 次
            n=0
            until git pull --rebase -X theirs origin ${GITHUB_REF_NAME} \
                  && git push origin HEAD:${GITHUB_REF_NAME}; do
              n=$((n+1))
              if [ "$n" -ge 3 ]; then echo "::error::push failed after 3 attempts"; exit 1; fi
              git rebase --abort 2>/dev/null || true
              sleep 15
            done
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "slug=$slug" >> "$GITHUB_OUTPUT"
          fi

      # Vercel 的 Git 集成部署与 Deploy Hook 均实测过不可靠（2026-07-20：webhook 推送
      # 不再建部署、hook 返回 PENDING job 但从不生成部署）。看门狗：先等 Git 集成生效；
      # 超时则直接经 Vercel REST API 从 git 源强制创建生产部署（实测该路径稳定 READY）。
      - name: Deploy watchdog (Vercel stuck-build fallback)
        if: steps.commit.outputs.pushed == 'true' && steps.commit.outputs.slug != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SLUG: ${{ steps.commit.outputs.slug }}
        run: |
          url="https://trendflow-site.vercel.app/briefings/${SLUG}"
          check() {
            for i in $(seq 1 "$1"); do
              sleep 30
              code=$(curl -s -o /dev/null -w '%{http_code}' "$url" || echo 000)
              echo "  attempt $i: HTTP $code"
              [ "$code" = "200" ] && return 0
            done
            return 1
          }
          echo "waiting for git-integration deploy of $url"
          if check 6; then echo "deploy verified"; exit 0; fi
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::deploy not live after 3min and no VERCEL_TOKEN configured"
            exit 0
          fi
          echo "git-integration deploy stuck; creating deployment via Vercel API"
          # 健壮性要求（2026-07-23 实测教训）：/v2/teams 无 'teams' 字段时旧脚本
          # KeyError 崩溃，把"发布成功"的运行整体标红。降级路径的任何失败都必须
          # 如实打印并以 warning 收场——内容会随下一轮部署自愈，工作流红/绿信号
          # 只留给真正的流水线故障；线上合规与可达性由 referral-monitor 独立把关。
          python3 - <<'EOF' || echo "::warning::API fallback failed; content self-heals on next run's deploy"
          import json, os, sys
          import requests

          tok = os.environ["VERCEL_TOKEN"]
          H = {"Authorization": f"Bearer {tok}"}
          api = "https://api.vercel.com"

          r = requests.get(f"{api}/v2/teams", headers=H, timeout=30)
          teams = (r.json().get("teams") or []) if r.ok else []
          scopes = [t["id"] for t in teams] + [None]  # 团队作用域优先，个人作用域兜底
          for team_id in scopes:
              q = f"?teamId={team_id}" if team_id else ""
              r = requests.get(f"{api}/v9/projects/trendflow-site{q}", headers=H, timeout=30)
              if not r.ok:
                  print(f"scope {team_id or 'personal'}: project lookup HTTP {r.status_code}: {r.text[:200]}")
                  continue
              repo_id = r.json()["link"]["repoId"]
              q = f"?teamId={team_id}&forceNew=1" if team_id else "?forceNew=1"
              r = requests.post(
                  f"{api}/v13/deployments{q}", headers=H, timeout=60,
                  json={"name": "trendflow-site", "target": "production",
                        "gitSource": {"type": "github", "repoId": repo_id, "ref": "master"}})
              d = r.json()
              print(f"api deployment (scope {team_id or 'personal'}): HTTP {r.status_code}",
                    d.get("id"), d.get("readyState") or json.dumps(d.get("error"))[:300])
              if r.ok:
                  sys.exit(0)
          sys.exit(1)
          EOF
          if check 10; then echo "fallback deploy verified"; exit 0; fi
          echo "::warning::content still not live yet; will self-heal on next run"
          exit 0
